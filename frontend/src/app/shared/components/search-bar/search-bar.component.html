<div class="relative w-full max-w-md" appClickOutside (clickOutside)="closeOverlay()">
  <div class="flex items-center bg-slate-100 rounded-full px-4 py-2 border border-transparent focus-within:border-indigo-400 focus-within:bg-white focus-within:shadow-sm transition-all duration-200">
    <span class="material-symbols-outlined text-slate-400 text-sm mr-2 select-none">search</span>
    <input 
      type="text" 
      [value]="query"
      (input)="onInput($event)"
      (focus)="onFocus()"
      (keydown)="onKeyDown($event)"
      placeholder="Search products..." 
      class="bg-transparent border-none focus:ring-0 text-sm w-full text-slate-900 outline-none placeholder:text-slate-400"
      autocomplete="off"
    >
    @if (isLoading) {
      <div class="w-4 h-4 border-2 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin ml-2"></div>
    } @else if (query) {
      <button (click)="query = ''; closeOverlay()" class="ml-2 text-slate-400 hover:text-slate-600 transition-colors">
        <span class="material-symbols-outlined !text-sm">close</span>
      </button>
    }
  </div>

  @if (isOverlayOpen) {
    <app-search-overlay
      [results]="results"
      [isLoading]="isLoading"
      [query]="query"
      (resultSelected)="onResultSelected($event)"
      (viewAllClicked)="submitSearch()"
    ></app-search-overlay>
  }
</div>
