<div [routerLink]="['/products', product.slug]" class="relative">
  <!-- Image Container -->
  <div class="relative aspect-[4/5] overflow-hidden rounded-lg bg-surface-container mb-4">
    <img
      [src]="primaryImage"
      [alt]="product.name"
      class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
    />
    
    <!-- Hover Action -->
    <div class="absolute bottom-4 left-4 right-4 translate-y-12 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300">
      <button class="w-full bg-primary text-on-primary py-2 rounded-lg font-label-md shadow-xl active:scale-95 transition-transform" (click)="$event.stopPropagation()">
        Add to Cart
      </button>
    </div>

    <!-- Badges -->
    @if (product.stock === 0) {
      <span class="absolute top-4 left-4 bg-error text-on-error px-2 py-1 rounded-sm font-label-sm shadow-sm">
        Out of Stock
      </span>
    } @else if (hasDiscount) {
      <span class="absolute top-4 left-4 bg-white text-primary px-2 py-1 rounded-sm font-label-sm shadow-sm">
        Sale
      </span>
    }
  </div>

  <!-- Content -->
  <div class="space-y-1">
    <h4 class="font-body-md font-bold text-on-surface line-clamp-2 min-h-[3rem]">
      {{ product.name }}
    </h4>
    
    <!-- Rating -->
    <div class="flex items-center gap-0.5 text-amber-400">
      <span class="material-symbols-outlined !text-lg fill-1">star</span>
      <span class="material-symbols-outlined !text-lg fill-1">star</span>
      <span class="material-symbols-outlined !text-lg fill-1">star</span>
      <span class="material-symbols-outlined !text-lg fill-1">star</span>
      <span class="material-symbols-outlined !text-lg">star_half</span>
    </div>

    <!-- Price -->
    <div class="flex items-center gap-2">
      @if (hasDiscount) {
        <p class="text-primary font-bold">{{ product.discount_price | currency }}</p>
        <p class="text-on-surface-variant line-through font-body-sm">{{ product.price | currency }}</p>
      } @else {
        <p class="text-primary font-bold">{{ product.price | currency }}</p>
      }
    </div>
  </div>
</div>
