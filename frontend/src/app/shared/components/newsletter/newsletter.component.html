<section class="py-24 max-w-7xl mx-auto px-6">
  <div class="bg-indigo-600 rounded-3xl overflow-hidden relative p-12 md:p-24 flex flex-col items-center text-center">
    <!-- Decorative Circles -->
    <div class="absolute top-0 right-0 w-96 h-96 bg-indigo-500 rounded-full blur-3xl opacity-20 -mr-20 -mt-20"></div>
    <div class="absolute bottom-0 left-0 w-64 h-64 bg-sky-400 rounded-full blur-3xl opacity-10 -ml-10 -mb-10"></div>

    <!-- Content -->
    <div class="relative z-10 max-w-xl space-y-6">
      <h2 class="font-h1 text-h1 text-white">Join the Nexus Circle</h2>
      <p class="text-indigo-100 font-body-lg">
        Get early access to collections, exclusive invitations to private sales, and the latest news in modern design.
      </p>

      <!-- Subscription Form (Div wrapper, no <form>) -->
      <div class="flex flex-col md:flex-row gap-3 w-full">
        <input 
          type="email" 
          [(ngModel)]="email"
          placeholder="Enter your email address"
          class="flex-1 bg-white/10 border border-white/20 text-white placeholder:text-indigo-200 rounded-xl px-6 py-4 focus:ring-2 focus:ring-white outline-none backdrop-blur-sm"
          [disabled]="isSubmitting"
        />
        <button 
          (click)="onSubscribe()"
          [disabled]="isSubmitting"
          class="bg-white text-indigo-600 px-8 py-4 rounded-xl font-label-md hover:bg-indigo-50 transition-colors active:scale-95 whitespace-nowrap flex items-center justify-center min-w-[160px]"
        >
          @if (isSubmitting) {
            <span class="material-symbols-outlined animate-spin">progress_activity</span>
          } @else {
            Subscribe Now
          }
        </button>
      </div>

      <!-- Messages -->
      @if (successMessage) {
        <p class="text-green-400 font-label-md animate-fade-in">{{ successMessage }}</p>
      }
      @if (errorMessage) {
        <p class="text-indigo-200 font-label-md animate-fade-in">{{ errorMessage }}</p>
      }

      <p class="text-indigo-200 text-xs">By subscribing, you agree to our Privacy Policy and Terms of Service.</p>
    </div>
  </div>
</section>
